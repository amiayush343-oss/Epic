<!DOCTYPE html>
<html>
<head>
  <title>Epic</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { margin: 0; box-sizing: border-box; }
    body { font-family: Arial; background: #212121; color: #fff; }
.header { background: #171717; padding: 15px; text-align: center; font-weight: bold; font-size: 18px; }
    #chat { height: 85vh; overflow-y: auto; padding: 15px; }
.msg { margin: 12px 0; padding: 12px 16px; border-radius: 18px; max-width: 80%; line-height: 1.4; }
.user { background: #2f2f2f; margin-left: auto; }
.bot { background: #444654; }
    #input-area { display: flex; padding: 15px; background: #171717; position: fixed; bottom: 0; width: 100%; }
    #input { flex: 1; padding: 12px; border: 1px solid #555; background: #2f2f2f; color: white; border-radius: 25px; outline: none; }
    #send { padding: 12px 20px; margin-left: 10px; border: none; background: #19c37d; color: white; border-radius: 25px; font-weight: bold; }
  </style>
</head>
<body>
  <div class="header">Epic 🤖</div>
  <div id="chat">
    <div class="msg bot">Haan bhai, Epic ready hai. Bolo ki help chai? 😎</div>
  </div>
  <div id="input-area">
    <input id="input" placeholder="Message likho..." onkeypress="if(event.key==='Enter') sendMsg()">
    <button id="send" onclick="sendMsg()">Send</button>
  </div>

<script>
const chatBox = document.getElementById('chat');
const inputBox = document.getElementById('input');
const GEMINI_API_KEY = "AIzaSyDSGA11ZVK4ZPjGtHp_pYlExMTGPp5yVLc";

async function sendMsg() {
  const userText = inputBox.value.trim();
  if (!userText) return;
  chatBox.innerHTML += `<div class="msg user">${userText}</div>`;
  inputBox.value = "";
  chatBox.innerHTML += `<div class="msg bot" id="temp">Typing...</div>`;
  chatBox.scrollTop = chatBox.scrollHeight;
  
  try {
    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash-latest:generateContent?key=${GEMINI_API_KEY}`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        contents: [{ parts: [{ text: `Tumi Epic naam er AI. Tumi Birpara er local bhai er moto kotha bolo. Hasi-moja, friendly tone e reply koro. User: ${userText}` }] }]
      })
    });
    const data = await res.json();
    const botReply = data.candidates[0].content.parts[0].text;
    document.getElementById('temp').remove();
    chatBox.innerHTML += `<div class="msg bot">${botReply}</div>`;
  } catch (err) {
    document.getElementById('temp').innerText = "Error bhai! API Key check koro ya net check koro.";
  }
  chatBox.scrollTop = chatBox.scrollHeight;
}
</script>
</body>
</html>
