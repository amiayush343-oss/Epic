<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Epic 🤖</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a0a; color: #fff; font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; }
       .chat-container { width: 100%; max-width: 600px; height: 90vh; background: #1a1a1a; border-radius: 12px; display: flex; flex-direction: column; overflow: hidden; }
       .header { background: #000; padding: 15px; text-align: center; font-size: 20px; font-weight: bold; }
       .messages { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
       .msg { padding: 10px 15px; border-radius: 18px; max-width: 80%; word-wrap: break-word; }
       .user { background: #0084ff; align-self: flex-end; }
       .bot { background: #333; align-self: flex-start; }
       .input-area { display: flex; padding: 10px; background: #000; gap: 10px; }
        input { flex: 1; padding: 12px; border: none; border-radius: 25px; background: #333; color: #fff; outline: none; }
        button { padding: 12px 20px; border: none; border-radius: 25px; background: #00c853; color: #fff; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="header">Epic 🤖 Birpara to Kharagpur</div>
        <div class="messages" id="messages">
            <div class="msg bot">Haan bhai, Epic ready hai! Birpara theke bolchi, ki help chai? 😎</div>
        </div>
        <div class="input-area">
            <input type="text" id="userInput" placeholder="Message likho..." onkeypress="if(event.key==='Enter') sendMessage()">
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        const API_KEY = "AIzaSyAXphDxAKDXdSAh8tfIFEcxaFkReb_6tdts1N7X4";
        const messagesDiv = document.getElementById('messages');

        async function sendMessage() {
            const input = document.getElementById('userInput');
            const userText = input.value.trim();
            if (!userText) return;

            messagesDiv.innerHTML += `<div class="msg user">${userText}</div>`;
            input.value = '';
            messagesDiv.innerHTML += `<div class="msg bot" id="typing">Epic typing...</div>`;
            messagesDiv.scrollTop = messagesDiv.scrollHeight;

            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{
                            parts: [{
                                text: `Tumi Epic, ekta friendly AI from Birpara. Tumi Kharagpur eo porashona korecho. Tumi Bengali ar Hindi mix kore kotha bolo, ar sobsomoy "bhai" bole dako. Ekhon user er ei proshner uttor dao: ${userText}`
                            }]
                        }]
                    })
                });

                const data = await res.json();
                document.getElementById('typing').remove();

                if (data.candidates && data.candidates[0].content) {
                    const botText = data.candidates[0].content.parts[0].text;
                    messagesDiv.innerHTML += `<div class="msg bot">${botText}</div>`;
                } else {
                    messagesDiv.innerHTML += `<div class="msg bot">Error bhai! API Key ba net check koro. 😅</div>`;
                }
            } catch (error) {
                document.getElementById('typing').remove();
                messagesDiv.innerHTML += `<div class="msg bot">Net Error bhai! 😭</div>`;
            }
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }
    </script>
</body>
</html>
