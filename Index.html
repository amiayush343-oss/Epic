<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Personal AI</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: #f1f5f9;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.container {
  width: 420px;
  background: white;
  border-radius: 15px;
  box-shadow: 0 5px 20px rgba(0,0,0,0.1);
  padding: 15px;
}

h2 {
  text-align: center;
  margin-bottom: 10px;
}

#chat {
  height: 300px;
  overflow-y: auto;
  margin-bottom: 10px;
  font-size: 14px;
}

.user { color: #2563eb; margin: 5px 0; }
.ai { color: #16a34a; margin: 5px 0; }

input, button {
  padding: 10px;
  border-radius: 10px;
  border: 1px solid #ddd;
}

input[type="text"] {
  width: 65%;
}

button {
  background: #2563eb;
  color: white;
  cursor: pointer;
}

.upload {
  margin-top: 5px;
}
</style>
</head>

<body>

<div class="container">
  <h2>🤖 Personal AI</h2>

  <div id="chat"></div>

  <input id="input" placeholder="Type message..." />
  <button onclick="send()">Send</button>

  <div class="upload">
    <input type="file" id="imageInput" accept="image/*" />
  </div>
</div>

<script>
const API_KEY = "YOUR_NEW_API_KEY"; // ⚠️ Apni new key yahan daalo

async function send() {
  const input = document.getElementById("input");
  const chat = document.getElementById("chat");
  const fileInput = document.getElementById("imageInput");

  const text = input.value;
  const file = fileInput.files[0];

  if (!text && !file) return;

  chat.innerHTML += `<div class="user">You: ${text || "[Image sent]"}</div>`;
  input.value = "";

  let parts = [];

  if (text) {
    parts.push({ text: text + " (Reply in user's language)" });
  }

  if (file) {
    const base64 = await toBase64(file);
    parts.push({
      inlineData: {
        mimeType: file.type,
        data: base64.split(',')[1]
      }
    });
  }

  const response = await fetch(
    `https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${API_KEY}`,
    {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        contents: [{ parts: parts }]
      })
    }
  );

  const data = await response.json();
  const aiText = data.candidates?.[0]?.content?.parts?.[0]?.text || "No response";

  chat.innerHTML += `<div class="ai">AI: ${aiText}</div>`;
  chat.scrollTop = chat.scrollHeight;

  fileInput.value = ""; // reset image
}

function toBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.readAsDataURL(file);
    reader.onload = () => resolve(reader.result);
    reader.onerror = error => reject(error);
  });
}
</script>

</body>
</html>
